<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/forms.css">
</head>
<body>
    <div class="all">
     <div class="card">
        <h2 >Let's chat</h2>
        <p >whether you have a question,want to start a project or simply want to connect.<br>feel free to send me a message in the contact form</p>
     </div><!--
     --><div class="card2">
      <form autocomplete="off" method="post" >
        <h2>Contact</h2>
        <input type="text" name="name" required placeholder="Name*" pattern="[A-Za-z]+">
        <input type="email" name="email" required placeholder="Email*" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,3}$">
        <input type="text" name="company" placeholder="Company" >
        <input type="tel" name="tel" placeholder="Phone" pattern="[0-2]{3}[0-9]{2}[0-9]{3}[0-9]{3}">
        <textarea placeholder="Message" rows="4"></textarea>
        <button>submit</button>
     </form>
     </div>
    </div>
</body>
</html>
